<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>RecorteAP</title>
    <link rel="stylesheet" href="style.css">
    <script src="CSInterface.js"></script>
</head>
<body>
    <div class="section">
        <h2>1. Setup</h2>
        <button id="btnChooseFolder">Selecionar Pasta de Destino</button>
        <div id="folderPathDisplay">Nenhuma pasta selecionada</div>
    </div>

    <div class="section">
        <h2>2. Despacho</h2>
        <button id="btnFullWidth" style="border-left: 3px solid var(--accent-color);">Letreiro Largura Total (Rosa)</button>
        <button id="btnSync" class="primary">Recortar</button>
    </div>

    <div class="section" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <h2 style="margin: 0; border: none;">Histórico / Recepção</h2>
            <div style="display: flex; gap: 5px;">
                <button id="btnRefresh" style="width: auto; padding: 3px 8px; margin: 0;">Atualizar</button>
                <button id="btnClearHistory" style="width: auto; padding: 3px 8px; margin: 0; background-color: #5a1a1a; border-color: #ff4081;">Limpar Tudo</button>
            </div>
        </div>
        
        <div style="background: #1e1e1e; padding: 6px 8px; border-radius: 4px; border: 1px solid #333; margin-bottom: 8px;">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #10b981; font-weight: bold; font-size: 12px;">
                <input type="checkbox" id="chkFixProfile" checked>
                Corrigir Perfil de Cor (Auto)
            </label>
        </div>

        <div id="historyList" class="history-container">
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
